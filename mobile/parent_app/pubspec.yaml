name: school_erp_parent
description: School ERP Parent App - Stay connected with your child's education
version: 1.0.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'
  flutter: ">=3.22.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State Management
  flutter_bloc: ^8.1.6
  equatable: ^2.0.5

  # Navigation
  go_router: ^14.2.7

  # Networking
  dio: ^5.7.0
  retrofit: ^4.4.1
  json_annotation: ^4.9.0

  # Storage
  flutter_secure_storage: ^9.2.2
  shared_preferences: ^2.3.2
  hive_flutter: ^1.1.0

  # Firebase
  firebase_core: ^3.4.1
  firebase_messaging: ^15.1.1
  flutter_local_notifications: ^17.2.2

  # UI
  cupertino_icons: ^1.0.8
  material_design_icons_flutter: ^7.0.7296
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  fl_chart: ^0.69.0
  intl: ^0.19.0
  image_picker: ^1.1.2
  file_picker: ^8.1.2
  url_launcher: ^6.3.0
  share_plus: ^10.0.2
  qr_flutter: ^4.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.12
  retrofit_generator: ^9.1.5
  json_serializable: ^6.8.0
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  # Asset directories — uncomment after adding files:
  # assets:
  #   - assets/images/
  #   - assets/icons/
